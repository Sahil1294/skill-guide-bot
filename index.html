<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skill GUide</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7cffd4;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --glow: rgba(124, 255, 212, 0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.5;
      animation: gridDrift 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrift {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(124,255,212,0.07) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(124,255,212,0.3);
      padding: 0.35rem 0.9rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      background: rgba(124,255,212,0.05);
      animation: fadeDown 0.6s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1.0;
      text-align: center;
      letter-spacing: -0.02em;
      animation: fadeUp 0.7s 0.1s ease both;
      max-width: 720px;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: 0.4;
      border-radius: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-top: 1.2rem;
      text-align: center;
      max-width: 440px;
      line-height: 1.7;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      margin-top: 2.8rem;
      animation: fadeUp 0.7s 0.35s ease both;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2rem;
      border-radius: 0.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover::before { opacity: 0.12; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,255,212,0.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--muted);
      background: var(--surface);
      transform: translateY(-2px);
    }

    /* Animated dot */
    .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 3.5rem;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.2rem;
      display: block;
    }

    .divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* Corner decoration */
    .corner {
      position: fixed;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .corner-tl { top: 1.5rem; left: 1.5rem; }
    .corner-tr { top: 1.5rem; right: 1.5rem; text-align: right; }
    .corner-bl { bottom: 1.5rem; left: 1.5rem; }
    .corner-br { bottom: 1.5rem; right: 1.5rem; }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
    }
  </style>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Corner labels -->
  <div class="corner corner-tr">AI · CHATBOT · v1.0</div>
  <div class="corner corner-bl" id="clock"></div>
  <div class="corner corner-br">BUILT WITH BOTPRESS</div>

  <div class="container">
    <div class="badge"><span class="dot"></span> &nbsp; Live Demo Available</div>

    <h1>SKILL <span> GUIDE </span><br/>BOT</h1>

    <p class="subtitle">
      An intelligent conversational assistant Designed by SAHIL SATHE.<br/>
      Click below to launch a live interactive demo.
    </p>

    <div class="cta-group">
      <a
        class="btn btn-primary"
        href="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/02/12/02/20260212024435-FPLPUT5I.json"
        target="_blank"
        rel="noopener noreferrer"
      >
        ⚡ Launch Chatbot
      </a>
      <a class="btn btn-ghost" href="https://github.com" target="_blank" rel="noopener noreferrer">
        ⌥ View on GitHub
      </a>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value">AI</span>
        <span class="stat-label">Powered</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-value">24/7</span>
        <span class="stat-label">Available</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-value">NLP</span>
        <span class="stat-label">Engine</span>
      </div>
    </div>
  </div>

  <script>
    // Clock
    const clock = document.getElementById('clock');
    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.width = p.style.height = (Math.random() > 0.6 ? '3px' : '2px');
      container.appendChild(p);
    }
  </script>

</body>
</html>
