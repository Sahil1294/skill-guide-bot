<!DOCTYPE html>
<html>
<head>
<title>Skill Guide AI Bot</title>

<style>
/* Dark Theme Page */
body {
    margin: 0;
    padding: 0;
    background-color: #0f172a;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Title Styling */
h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* Make chatbot full screen */
#bp-web-widget-container {
    position: fixed !important;
    width: 100vw !important;
    height: 100vh !important;
    bottom: 0 !important;
    right: 0 !important;
}
</style>

</head>

<body>

<h2>Skill Guide – AI Career Assistant Bot</h2>
<p>Chat with the AI assistant below 👇</p>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script>
window.botpressWebChat.init({
  "configUrl": "https://files.bpcontent.cloud/2026/02/12/02/20260212024435-XIUJP51T.json",
  "layoutWidth": "100%",
  "layoutHeight": "100%",
  "hideWidget": false
});
</script>

</body>
</html>
