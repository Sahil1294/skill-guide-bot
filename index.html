<!DOCTYPE html>
<html>
<head>
<title>Skill Guide AI Bot</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0b1736;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    margin-bottom:30px;
}

/* Button Styling */
.start-btn{
    background:#4f46e5;
    color:white;
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#6366f1;
    transform:scale(1.05);
}
</style>

</head>

<body>

<h1>Skill Guide – AI Career Assistant Bot</h1>
<p>Chat with the AI assistant below 👇</p>

<button class="start-btn" onclick="openChat()">Start Chat</button>

<script>
function openChat(){
    window.location.href="chat.html";
}
</script>

</body>
</html>
